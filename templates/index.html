<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RL Maintenance — Field Operations Tools</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="page-home">

  <main class="home-center">
    <div class="home-card">


      <div class="home-logo">
         <img src="{{ url_for('static', filename='images/logo.png') }}" alt="RL Maintenance Logo">
      </div>

      <div class="home0-logo">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="48" height="48" rx="12" fill="#1A2B4A"/>
          <path d="M12 34V14h10c3.3 0 5.8.7 7.5 2.1 1.7 1.4 2.5 3.3 2.5 5.9 0 1.8-.4 3.3-1.3 4.6-.9 1.3-2.1 2.2-3.7 2.7L32 34h-5.5l-4.3-8H17v8h-5zm5-12h4.8c1.5 0 2.6-.3 3.4-1 .8-.7 1.2-1.6 1.2-2.9s-.4-2.2-1.2-2.8c-.8-.6-2-.9-3.5-.9H17v7.6z" fill="#FF6B35"/>
          <rect x="10" y="38" width="28" height="2" rx="1" fill="#FF6B35" opacity="0.5"/>
        </svg>
      </div>

      <h1 class="home-title">RL Maintenance<br>Field Operations</h1>
      <p class="home-subtitle">Select a tool to get started.</p>

      <div class="home-services">

        <a href="{{ url_for('upload') }}" class="service-card" id="prepare-btn">
          <div class="service-card__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="12" y1="18" x2="12" y2="12"/>
              <line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
          </div>
          <div class="service-card__body">
            <span class="service-card__title">Prepare Report</span>
            <span class="service-card__desc">Generate a Word maintenance report from a supervisor assignment image.</span>
          </div>
          <div class="service-card__arrow">&#8594;</div>
        </a>

        <a href="{{ url_for('combine_photos_page') }}" class="service-card service-card--teal" id="combine-btn">
          <div class="service-card__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <rect x="3" y="3" width="8" height="8" rx="1.5"/>
              <rect x="13" y="3" width="8" height="8" rx="1.5"/>
              <rect x="3" y="13" width="8" height="8" rx="1.5"/>
              <rect x="13" y="13" width="8" height="8" rx="1.5"/>
            </svg>
          </div>
          <div class="service-card__body">
            <span class="service-card__title">Combine Photos</span>
            <span class="service-card__desc">Merge multiple site photos into one compressed, shareable image.</span>
          </div>
          <div class="service-card__arrow">&#8594;</div>
        </a>

      </div>

    </div>
  </main>

  <footer class="site-footer">
    RL Maintenance Team &mdash; Field Operations
  </footer>

</body>
</html>
