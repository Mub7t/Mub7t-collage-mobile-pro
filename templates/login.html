<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — RL Maintenance</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />

  <style>
    body.page-login {
      min-height: 100vh;
      color: #111827 !important;
      background:
        radial-gradient(circle at 50% -9rem, rgba(255,255,255,.96), rgba(255,255,255,0) 28rem),
        linear-gradient(180deg, #f7f7f9 0%, #eceef2 100%) !important;
    }

    .login-shell {
      width: min(100%, 520px);
      min-height: calc(100vh - 64px);
      margin: 0 auto;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-login .login-card {
      width: 100%;
      max-width: 378px !important;
      padding: 24px !important;
      display: flex;
      flex-direction: column;
      gap: 18px !important;
      border-radius: 30px !important;
      background: rgba(255,255,255,.88) !important;
      border: 1px solid rgba(255,255,255,.82) !important;
      box-shadow:
        0 28px 70px rgba(17,24,39,.12),
        0 2px 10px rgba(17,24,39,.04),
        inset 0 1px 0 rgba(255,255,255,.85) !important;
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      animation: fadeInUp .45s cubic-bezier(.2,.8,.4,1) both;
    }

    .login-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding-top: 2px;
      text-align: center;
    }

    .page-login .home-logo {
      width: 86px !important;
      height: 86px !important;
      margin: 0 auto 8px !important;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 25px !important;
      background:
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(248,249,251,.92)) !important;
      border: 1px solid rgba(17,24,39,.08) !important;
      box-shadow: 0 18px 38px rgba(17,24,39,.10) !important;
    }

    .page-login .home-logo img {
      width: 64% !important;
      height: 64% !important;
      object-fit: contain;
      filter: grayscale(100%) contrast(1.08);
    }

    .login-title {
      margin: 0;
      color: #111827;
      font-size: 1.45rem !important;
      line-height: 1.12;
      font-weight: 850;
      letter-spacing: -.035em;
      text-align: center;
    }

    .login-sub {
      margin: 0;
      color: #667085 !important;
      font-size: .88rem;
      line-height: 1.4;
      text-align: center;
    }

    .login-error {
      padding: 10px 12px;
      color: #991b1b;
      background: rgba(254,242,242,.9);
      border: 1px solid rgba(185,28,28,.16);
      border-radius: 16px !important;
      font-size: .85rem;
      line-height: 1.4;
      text-align: center;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .login-field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .login-field label {
      color: #1f2937;
      font-size: .68rem;
      line-height: 1;
      font-weight: 850;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .page-login .login-field input {
      width: 100%;
      min-height: 46px !important;
      padding: 0 14px;
      border-radius: 15px !important;
      border: 1px solid rgba(17,24,39,.10) !important;
      background: rgba(255,255,255,.82) !important;
      color: #111827 !important;
      font-size: .96rem;
      font-family: inherit;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.8),
        0 1px 2px rgba(17,24,39,.03) !important;
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .page-login .login-field input:focus {
      outline: none;
      border-color: rgba(17,17,17,.36) !important;
      background: #ffffff !important;
      box-shadow: 0 0 0 4px rgba(17,17,17,.075) !important;
    }

    .page-login .login-field input::placeholder {
      color: #a0a7b2;
    }

    .page-login .login-btn {
      width: 100%;
      min-height: 46px !important;
      margin-top: 2px;
      padding: 0 18px !important;
      border: 1px solid #111111 !important;
      border-radius: 15px !important;
      background: #111111 !important;
      color: #ffffff !important;
      font-family: inherit;
      font-size: .96rem;
      font-weight: 850;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(17,17,17,.16) !important;
      transition: transform .16s ease, box-shadow .18s ease, background .18s ease;
    }

    .page-login .login-btn:hover {
      background: #000000 !important;
      transform: translateY(-1px);
      box-shadow: 0 18px 34px rgba(17,17,17,.2) !important;
    }

    .page-login .login-btn:active {
      transform: translateY(0);
      box-shadow: 0 10px 20px rgba(17,17,17,.14) !important;
    }

    .page-login .site-footer {
      color: #8a9099 !important;
      padding-bottom: 18px;
    }

    @media (max-width: 520px) {
      .login-shell {
        min-height: calc(100vh - 56px);
        padding: 18px;
      }

      .page-login .login-card {
        max-width: calc(100vw - 36px) !important;
        padding: 22px !important;
        border-radius: 26px !important;
      }

      .page-login .home-logo {
        width: 78px !important;
        height: 78px !important;
        border-radius: 23px !important;
      }
    }
  </style>
</head>

<body class="page-home page-login">

  <main class="home-center login-shell">
    <div class="login-card">

      <div class="login-header">
        <div class="home-logo">
          <img src="{{ url_for('static', filename='images/logo.png') }}" alt="RL Maintenance Logo">
        </div>

        <h1 class="login-title">RL Maintenance</h1>
        <p class="login-sub">Field Operations Console</p>
      </div>

      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="{{ url_for('login') }}" class="login-form">
        <div class="login-field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username"
                 placeholder="Enter your username"
                 autocomplete="username" required autofocus />
        </div>

        <div class="login-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 placeholder="Enter your password"
                 autocomplete="current-password" required />
        </div>

        <button type="submit" class="login-btn">Sign In</button>
      </form>

    </div>
  </main>

  <footer class="site-footer">
    RL Maintenance Team &mdash; Field Operations
  </footer>

</body>
</html>
